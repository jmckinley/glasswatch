apiVersion: v1
kind: Service
metadata:
  name: glasswatch-redis
  namespace: glasswatch
  labels:
    app: glasswatch
    component: redis
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 6379
    targetPort: redis
    protocol: TCP
    name: redis
  selector:
    app: glasswatch
    component: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: glasswatch-redis
  namespace: glasswatch
  labels:
    app: glasswatch
    component: redis
spec:
  serviceName: glasswatch-redis
  replicas: 1  # Single instance for now (can scale to Redis Cluster later)
  selector:
    matchLabels:
      app: glasswatch
      component: redis
  template:
    metadata:
      labels:
        app: glasswatch
        component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # Redis user
        fsGroup: 999
      
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        
        command:
        - redis-server
        - --maxmemory
        - "512mb"
        - --maxmemory-policy
        - allkeys-lru
        - --save
        - "900 1"  # Save after 900 sec (15 min) if at least 1 key changed
        - --save
        - "300 10"  # Save after 300 sec (5 min) if at least 10 keys changed
        - --save
        - "60 10000"  # Save after 60 sec if at least 10000 keys changed
        - --appendonly
        - "yes"  # Enable AOF for durability
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        volumeMounts:
        - name: redis-data
          mountPath: /data
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
  
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: fast-ssd

---
# Redis PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: glasswatch-redis-pdb
  namespace: glasswatch
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: glasswatch
      component: redis

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: glasswatch-backend-hpa
  namespace: glasswatch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: glasswatch-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50  # Scale down max 50% at a time
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
      - type: Percent
        value: 100  # Can double pods at once
        periodSeconds: 60
      - type: Pods
        value: 2  # Or add 2 pods at once
        periodSeconds: 60
      selectPolicy: Max  # Use whichever policy scales up more

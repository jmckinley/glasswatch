# TEMPLATE - DO NOT COMMIT WITH REAL VALUES
# Generate secrets with: kubectl create secret generic glasswatch-secrets --from-literal=key=value

apiVersion: v1
kind: Secret
metadata:
  name: glasswatch-secrets
  namespace: glasswatch
type: Opaque
stringData:
  # Database credentials
  DATABASE_USER: "glasswatch"
  DATABASE_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  
  # Application secrets
  SECRET_KEY: "REPLACE_WITH_RANDOM_SECRET_KEY"  # Generate with: openssl rand -hex 32
  
  # WorkOS (SSO)
  WORKOS_API_KEY: "REPLACE_OR_DELETE_IF_NOT_USED"
  WORKOS_CLIENT_ID: "REPLACE_OR_DELETE_IF_NOT_USED"
  
  # AWS Credentials (for S3, KMS, etc.)
  AWS_ACCESS_KEY_ID: "REPLACE_OR_USE_IAM_ROLES"
  AWS_SECRET_ACCESS_KEY: "REPLACE_OR_USE_IAM_ROLES"
  
  # External API keys
  NVD_API_KEY: "REPLACE_IF_USED"
  SNAPPER_API_KEY: "REPLACE_IF_USED"
  
  # Backup encryption
  BACKUP_ENCRYPTION_KEY: "REPLACE_WITH_FERNET_KEY"  # Generate with backup service

---

apiVersion: v1
kind: Service
metadata:
  name: glasswatch-backend
  namespace: glasswatch
  labels:
    app: glasswatch
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: glasswatch
    component: backend
  sessionAffinity: None

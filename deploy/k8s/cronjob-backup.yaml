apiVersion: batch/v1
kind: CronJob
metadata:
  name: glasswatch-daily-backup
  namespace: glasswatch
spec:
  # Run daily at 00:00 UTC
  schedule: "0 0 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid  # Don't run concurrent backups
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: glasswatch
            component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: glasswatch-backup
          
          containers:
          - name: backup
            image: glasswatch/backend:latest  # Same image as backend
            command:
            - python3
            - scripts/backup_cli.py
            - create
            - --type
            - full
            
            envFrom:
            - configMapRef:
                name: glasswatch-config
            
            env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: DATABASE_PASSWORD
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: DATABASE_USER
            - name: BACKUP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: BACKUP_ENCRYPTION_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
            
            volumeMounts:
            - name: backup-storage
              mountPath: /var/backups/glasswatch
            
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "1Gi"
                cpu: "500m"
          
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: glasswatch-backup-pvc


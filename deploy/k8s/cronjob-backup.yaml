# Hourly incremental backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: glasswatch-hourly-backup
  namespace: glasswatch
spec:
  # Run every hour at minute 0
  schedule: "0 * * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 24
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: glasswatch
            component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: glasswatch-backup
          
          containers:
          - name: backup
            image: glasswatch/backend:latest
            command:
            - python3
            - scripts/backup_cli.py
            - create
            - --type
            - incremental
            
            envFrom:
            - configMapRef:

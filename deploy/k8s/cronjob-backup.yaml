              claimName: glasswatch-backup-pvc

---
# Weekly backup pruning
apiVersion: batch/v1
kind: CronJob
metadata:
  name: glasswatch-backup-prune
  namespace: glasswatch
spec:
  # Run weekly on Sunday at 02:00 UTC
  schedule: "0 2 * * 0"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: glasswatch
            component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: glasswatch-backup
          
          containers:
          - name: prune
            image: glasswatch/backend:latest
            command:
            - python3
            - scripts/backup_cli.py
            - prune
            - --yes  # Auto-confirm
            
            envFrom:
            - configMapRef:
                name: glasswatch-config
            
            env:
            - name: BACKUP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: glasswatch-secrets
                  key: BACKUP_ENCRYPTION_KEY
            
            volumeMounts:
            - name: backup-storage
              mountPath: /var/backups/glasswatch
            
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: glasswatch-backup-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glasswatch-backup
  namespace: glasswatch
  annotations:
    # For AWS IAM roles (IRSA) to access S3
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/glasswatch-backup

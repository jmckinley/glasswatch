apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasswatch-backend
  namespace: glasswatch
  labels:
    app: glasswatch
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: glasswatch
      component: backend
  template:
    metadata:
      labels:
        app: glasswatch
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: glasswatch-backend
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init container to wait for database
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z glasswatch-postgres 5432; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database is ready"
      
      containers:
      - name: backend
        image: glasswatch/backend:latest  # Replace with actual image from registry
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: glasswatch-config
        
        # Environment variables from Secrets
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: DATABASE_USER
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: SECRET_KEY
        - name: WORKOS_API_KEY
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: WORKOS_API_KEY
              optional: true
        - name: WORKOS_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: WORKOS_CLIENT_ID
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: AWS_ACCESS_KEY_ID
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: AWS_SECRET_ACCESS_KEY
              optional: true
        - name: NVD_API_KEY
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: NVD_API_KEY
              optional: true
        - name: BACKUP_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: glasswatch-secrets
              key: BACKUP_ENCRYPTION_KEY
        
        # Construct DATABASE_URL from components
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
        
        # Resource limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # Health probes
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Startup probe (for slow starts)
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30  # 30 * 5 = 150 seconds max startup time
        
        # Volume mounts
        volumeMounts:
        - name: backup-storage
          mountPath: /var/backups/glasswatch
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Set to true after testing
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
      
      volumes:
      - name: backup-storage
        persistentVolumeClaim:
          claimName: glasswatch-backup-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glasswatch-backend
  namespace: glasswatch
  annotations:
    # For AWS IAM roles (IRSA)
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/glasswatch-backend

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glasswatch-backup-pvc
  namespace: glasswatch
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd  # Adjust based on your cluster's storage classes

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glasswatch-ingress
  namespace: glasswatch
  annotations:
    # TLS certificate management via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Nginx ingress annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # CORS (if not handled by backend)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.glasswatch.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.glasswatch.example.com
    secretName: glasswatch-tls-cert
  rules:
  - host: api.glasswatch.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: glasswatch-backend
            port:
              number: 8000

---
# Frontend ingress (if serving frontend from K8s)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glasswatch-frontend-ingress
  namespace: glasswatch
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.glasswatch.example.com
    secretName: glasswatch-frontend-tls-cert
  rules:
  - host: app.glasswatch.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: glasswatch-frontend
            port:
              number: 3000

[pytest]
# Pytest configuration for Glasswatch backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests for individual services
    integration: Integration tests for API endpoints
    slow: Slow-running tests
    requires_db: Tests that require database

# Output options
console_output_style = progress
log_cli = false
log_cli_level = INFO

# Coverage (if using pytest-cov)
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (requires pytest-timeout)
timeout = 30
timeout_method = thread

# Ignore patterns
norecursedirs = .git .tox dist build *.egg __pycache__
